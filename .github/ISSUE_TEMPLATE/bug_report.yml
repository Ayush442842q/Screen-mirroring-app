name: Bug report
description: Report a reproducible problem in MirrorLink
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the bug.
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true
  - type: input
    id: sender
    attributes:
      label: Sender device
      placeholder: Android 14 phone, Windows laptop, etc.
  - type: input
    id: receiver
    attributes:
      label: Receiver device
      placeholder: Chrome on Android, tablet browser, etc.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
